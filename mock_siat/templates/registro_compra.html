<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Compras — SIAT</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
  <div class="ovt-marca">Oficina Virtual <span>Tributaria</span></div>
  <div class="tarjeta">
    <h1>REGISTRO DE COMPRAS</h1>
    <p class="subtitulo">Factura prevalorada</p>

    {% if exito %}<div class="mensaje-exito">{{ exito }}</div>{% endif %}
    {% if error %}<div class="mensaje-error">{{ error }}</div>{% endif %}

    <form id="form-registro-compra" action="{{ url_for('registro_compra') }}" method="post">
      <div class="campo">
        <label for="nitProveedor">NIT Proveedor</label>
        <input class="ovt-input" id="nitProveedor" name="nitProveedor" type="text">
      </div>
      <div class="campo">
        <label for="codigoAutorizacion">Código de Autorización</label>
        <input class="ovt-input" id="codigoAutorizacion" name="codigoAutorizacion" type="text">
      </div>
      <div class="fila-doble">
        <div class="campo">
          <label for="numeroFactura">Número de Factura</label>
          <input class="ovt-input" id="numeroFactura" name="numeroFactura" type="text">
        </div>
        <div class="campo">
          <label for="fechaFactura">Fecha de Factura</label>
          <input class="ovt-input" id="fechaFactura" name="fechaFactura" type="text"
                 placeholder="dd/mm/aaaa">
        </div>
      </div>
      <div class="fila-doble">
        <div class="campo">
          <label for="importeTotal">Importe Total</label>
          <input class="ovt-input" id="importeTotal" name="importeTotal" type="text">
        </div>
        <div class="campo">
          <label for="tipoCompra">Tipo de Compra</label>
          <select class="ovt-input" id="tipoCompra" name="tipoCompra">
            <option value="1">1 - Actividades gravadas</option>
            <option value="2">2 - Actividades no gravadas</option>
          </select>
        </div>
      </div>
      <div class="campo">
        <label for="codigoControl">Código de Control</label>
        <input class="ovt-input" id="codigoControl" name="codigoControl" type="text" value="0">
      </div>
      <button class="btnColorLoginOvt" id="btnRegistrar" type="submit">REGISTRAR COMPRA</button>
    </form>

    <div class="chips">
      <a class="link-login-chip" href="{{ url_for('menu') }}">Volver al menú</a>
    </div>
  </div>
</body>
</html>
